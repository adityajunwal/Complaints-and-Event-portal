<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Community Hub — Login</title>
  <meta name="description" content="Sign in to Smart Community Hub to manage events and complaints in your community." />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div class="auth-wrapper">
    <div class="auth-card card fade-up">
      <h1>🏘️ Community Hub</h1>
      <p class="subtitle">Your Smart Neighbourhood Platform</p>

      <div class="tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">Login</button>
        <button class="tab" id="tab-register" onclick="switchTab('register')">Register</button>
      </div>

      <div id="alert" class="alert alert-error"></div>

      <!-- Login Form -->
      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input id="login-email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input id="login-password" type="password" placeholder="••••••••" required />
        </div>
        <button id="login-btn" class="btn btn-primary" style="width:100%" type="submit">Login</button>
      </form>

      <!-- Register Form -->
      <form id="register-form" style="display:none" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label for="reg-name">Full Name</label>
          <input id="reg-name" type="text" placeholder="Jane Doe" required />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input id="reg-email" type="email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input id="reg-password" type="password" placeholder="min. 6 characters" required minlength="6" />
        </div>
        <button id="reg-btn" class="btn btn-primary" style="width:100%" type="submit">Create Account</button>
      </form>
    </div>
  </div>

  <script src="./app.js"></script>
  <script>
    // Redirect if already logged in
    if (getToken()) window.location.href = "/static/dashboard.html";

    function switchTab(tab) {
      document.getElementById("login-form").style.display    = tab === "login"    ? "block" : "none";
      document.getElementById("register-form").style.display = tab === "register" ? "block" : "none";
      document.getElementById("tab-login").classList.toggle("active", tab === "login");
      document.getElementById("tab-register").classList.toggle("active", tab === "register");
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById("login-btn");
      btn.disabled = true; btn.textContent = "Logging in…";
      try {
        const res = await fetch("/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email: document.getElementById("login-email").value, password: document.getElementById("login-password").value }),
        });
        const data = await res.json().catch(() => ({ detail: "Server error, please try again." }));
        if (!res.ok) throw new Error(data.detail || "Login failed");
        localStorage.setItem("token", data.token);
        localStorage.setItem("userName", data.name);
        localStorage.setItem("isAdmin", data.is_admin ? "true" : "false");
        window.location.href = "/static/dashboard.html";
      } catch (err) {
        showAlert("alert", err.message);
        btn.disabled = false; btn.textContent = "Login";
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById("reg-btn");
      btn.disabled = true; btn.textContent = "Creating…";
      try {
        const res = await fetch("/auth/register", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: document.getElementById("reg-name").value, email: document.getElementById("reg-email").value, password: document.getElementById("reg-password").value }),
        });
        const data = await res.json().catch(() => ({ detail: "Server error, please try again." }));
        if (!res.ok) throw new Error(data.detail || "Registration failed");
        localStorage.setItem("token", data.token);
        localStorage.setItem("userName", data.name);
        localStorage.setItem("isAdmin", data.is_admin ? "true" : "false");
        window.location.href = "/static/dashboard.html";
      } catch (err) {
        showAlert("alert", err.message);
        btn.disabled = false; btn.textContent = "Create Account";
      }
    }
  </script>
</body>
</html>
